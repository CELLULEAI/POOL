# Render.com — déploiement automatique
# https://render.com/docs/blueprint-spec
# Chemin SIMPLIFIE (sans pgvector ni signature). Requiert un Postgres pgvector
# externe ; la prod fédérée passe par docker/Dockerfile. Audit 2026-06-22.
services:
  - type: web
    name: iamine-pool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m iamine pool --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8080
    plan: free
