# Fly.io — déploiement
# fly launch → fly deploy
app = "iamine"
primary_region = "cdg"  # Paris

[build]
  # Chemin simplifie : Dockerfile racine (sans pgvector ni signature de release).
  # Requiert un Postgres pgvector EXTERNE. Voir docker/Dockerfile pour la prod.
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

# Domaine custom :
# fly certs add cellule.ai
# fly certs add www.cellule.ai
