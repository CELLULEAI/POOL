name: Build Windows Worker .exe

on:
  workflow_dispatch:
    inputs:
      iamine_version:
        description: "iamine-ai version to bundle (blank = latest from cellule.ai pypi)"
        required: false
        default: ""
      cpu_variant:
        description: "CPU variant (cpu, cuda)"
        required: true
        default: "cpu"
        type: choice
        options:
          - cpu
          - cuda
  push:
    tags:
      - "v*-worker"

permissions:
  contents: write

jobs:
  build:
    name: Build cellule-worker.exe (${{ inputs.cpu_variant || 'cpu' }})
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip + install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller==6.10.0

      - name: Install CUDA Toolkit (if cuda variant)
        if: inputs.cpu_variant == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "curand", "curand_dev", "visual_studio_integration"]'

      - name: Install llama-cpp-python (compile from source)
        shell: pwsh
        env:
          CPU_VARIANT: ${{ inputs.cpu_variant }}
        run: |
          if ($env:CPU_VARIANT -eq 'cuda') {
            Write-Host "Building llama-cpp-python with CUDA support"
            $env:CMAKE_ARGS = "-DGGML_CUDA=on"
            $env:FORCE_CMAKE = "1"
            Write-Host "CMAKE_ARGS=$env:CMAKE_ARGS"
            Write-Host "CUDA_PATH=$env:CUDA_PATH"
          } else {
            Write-Host "Building llama-cpp-python CPU-only"
          }
          python -m pip install llama-cpp-python --verbose
          python -c "import llama_cpp; print('llama_cpp_imported_ok', getattr(llama_cpp, '__version__', 'unknown'))"

      - name: Install iamine-ai (retry x3)
        shell: pwsh
        run: |
          $version = "${{ inputs.iamine_version }}"
          $installed = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "attempt $i/3 ..."
            if ([string]::IsNullOrEmpty($version)) {
              python -m pip install iamine-ai `
                --index-url https://cellule.ai/pypi `
                --extra-index-url https://pypi.org/simple
            } else {
              python -m pip install "iamine-ai==$version" `
                --index-url https://cellule.ai/pypi `
                --extra-index-url https://pypi.org/simple
            }
            if ($LASTEXITCODE -eq 0) {
              $installed = $true
              break
            }
            Write-Host "retry in 10s..."
            Start-Sleep -Seconds 10
          }
          if (-not $installed) {
            Write-Error "iamine-ai install failed after 3 attempts"
            exit 1
          }
          python -c "import iamine; print('iamine_imported_ok', iamine.__version__)"

      - name: Build .exe (enum DLLs + PyInstaller in one step)
        shell: pwsh
        run: |
          # Entry-point stub
          $content = @'
          import sys
          from iamine.__main__ import main
          if __name__ == "__main__":
              if len(sys.argv) == 1:
                  sys.argv += ["worker", "--auto"]
              main()
          '@
          $content | Out-File -Encoding ascii worker_entry.py

          # Locate llama_cpp DLLs
          $llamaPath = python -c "import llama_cpp, os; print(os.path.dirname(llama_cpp.__file__))"
          Write-Host "llama_cpp path: $llamaPath"
          $libDir = Join-Path $llamaPath "lib"
          if (-not (Test-Path $libDir)) {
            Write-Error "llama_cpp/lib missing"
            exit 1
          }
          $dlls = Get-ChildItem $libDir -Filter *.dll
          Write-Host "Found $($dlls.Count) DLLs in $libDir :"
          $dlls | ForEach-Object { Write-Host "  $($_.Name) $([math]::Round($_.Length / 1MB, 1)) MB" }

          # Build PyInstaller args (one add-binary per DLL)
          $pyinstArgs = @(
            "--onefile",
            "--name", "cellule-worker",
            "--paths", $llamaPath,
            "--collect-all", "iamine",
            "--collect-all", "llama_cpp",
            "--collect-submodules", "iamine",
            "--hidden-import=aiohttp",
            "--hidden-import=websockets",
            "--hidden-import=asyncpg",
            "--hidden-import=cryptography",
            "--hidden-import=llama_cpp",
            "--console"
          )
          foreach ($dll in $dlls) {
            $pyinstArgs += "--add-binary"
            $pyinstArgs += "$($dll.FullName);llama_cpp/lib"
          }
          $pyinstArgs += "worker_entry.py"

          Write-Host "pyinstaller arg count: $($pyinstArgs.Count)"
          & pyinstaller @pyinstArgs
          if ($LASTEXITCODE -ne 0) {
            Write-Error "pyinstaller failed exit $LASTEXITCODE"
            exit 1
          }
          Get-ChildItem dist/

      - name: Smoke test .exe
        shell: pwsh
        run: |
          .\dist\cellule-worker.exe --help
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cellule-worker.exe --help failed"
            exit 1
          }

      - name: Report size + fail if too small
        shell: pwsh
        run: |
          $size = (Get-Item dist/cellule-worker.exe).Length / 1MB
          Write-Host ("cellule-worker.exe size: {0:N1} MB" -f $size)
          if ($size -lt 30) {
            Write-Error "exe too small ($size MB, expected >=30) - DLLs missing"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellule-worker-${{ inputs.cpu_variant || 'cpu' }}-windows
          path: dist/cellule-worker.exe
          retention-days: 30

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Cellule Worker ${{ github.ref_name }}
          body: |
            Standalone Windows worker executable (CPU).
            Install: download cellule-worker.exe and double-click to start.
            Source: https://github.com/CELLULEAI/POOL
            Docs: https://cellule.ai/docs/install-worker.html
          files: dist/cellule-worker.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
