name: Build Windows Worker .exe

on:
  workflow_dispatch:
    inputs:
      iamine_version:
        description: "iamine-ai version to bundle (blank = latest from cellule.ai pypi)"
        required: false
        default: ""
      cpu_variant:
        description: "CPU variant (cpu, cuda)"
        required: true
        default: "cpu"
        type: choice
        options:
          - cpu
          - cuda
  push:
    tags:
      - "v*-worker"

permissions:
  contents: write

jobs:
  build:
    name: Build cellule-worker.exe (${{ inputs.cpu_variant || 'cpu' }})
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip + install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller==6.10.0

      - name: Install llama-cpp-python (pre-built Windows CPU wheel)
        shell: pwsh
        run: |
          python -m pip install llama-cpp-python `
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu/ `
            --verbose
          python -c "import llama_cpp; print(llama_cpp version:, llama_cpp.__version__)"

      - name: Install iamine-ai (dependencies already satisfied)
        shell: pwsh
        run: |
          $version = "${{ inputs.iamine_version }}"
          if ([string]::IsNullOrEmpty($version)) {
            python -m pip install iamine-ai `
              --index-url https://iamine.org/pypi `
              --extra-index-url https://pypi.org/simple `
              --verbose
          } else {
            python -m pip install "iamine-ai==$version" `
              --index-url https://iamine.org/pypi `
              --extra-index-url https://pypi.org/simple `
              --verbose
          }
          python -c "import iamine; print(iamine, iamine.__version__)"
          python -c "import llama_cpp; print(llama_cpp still ok)"

      - name: Write entry-point stub
        shell: pwsh
        run: |
          @"
          import sys
          from iamine.__main__ import main
          if __name__ == __main__:
              if len(sys.argv) == 1:
                  sys.argv += [worker, --auto]
              main()
          "@ | Out-File -Encoding ascii worker_entry.py

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          # Resolve llama_cpp install path so PyInstaller can bundle its DLLs + .metal
          $llamaPath = python -c "import llama_cpp, os; print(os.path.dirname(llama_cpp.__file__))"
          Write-Host "llama_cpp path: $llamaPath"
          Get-ChildItem $llamaPath -Recurse -Include *.dll,*.so,*.dylib,*.metal | Select-Object -First 20

          pyinstaller `
            --onefile `
            --name cellule-worker `
            --paths $llamaPath `
            --add-binary "$llamaPath\lib;llama_cpp/lib" `
            --collect-all iamine `
            --collect-all llama_cpp `
            --collect-submodules iamine `
            --hidden-import=aiohttp `
            --hidden-import=websockets `
            --hidden-import=asyncpg `
            --hidden-import=cryptography `
            --hidden-import=llama_cpp `
            --hidden-import=llama_cpp._ctypes_extensions `
            --console `
            worker_entry.py
          Get-ChildItem dist/

      - name: Smoke test .exe
        shell: pwsh
        run: |
          .\dist\cellule-worker.exe --help
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cellule-worker.exe --help failed"
            exit 1
          }

      - name: Report size + fail if too small
        shell: pwsh
        run: |
          $size = (Get-Item dist/cellule-worker.exe).Length / 1MB
          Write-Host ("cellule-worker.exe size: {0:N1} MB" -f $size)
          if ($size -lt 50) {
            Write-Error "exe too small ($size MB) - llama_cpp DLLs probably missing"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellule-worker-${{ inputs.cpu_variant || 'cpu' }}-windows
          path: dist/cellule-worker.exe
          retention-days: 30

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Cellule Worker ${{ github.ref_name }}
          body: |
            Standalone Windows worker executable (CPU).

            Install: download `cellule-worker.exe`, double-click to start.
            If Windows SmartScreen warns: right-click > Properties > Unblock.

            Source: https://github.com/CELLULEAI/POOL
            Docs: https://cellule.ai/docs/install-worker.html
          files: dist/cellule-worker.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
