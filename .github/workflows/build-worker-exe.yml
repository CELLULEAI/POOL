name: Build Windows Worker .exe

on:
  workflow_dispatch:
    inputs:
      iamine_version:
        description: "iamine-ai version to bundle (blank = latest from cellule.ai pypi)"
        required: false
        default: ""
      cpu_variant:
        description: "CPU variant (cpu, cuda)"
        required: true
        default: "cpu"
        type: choice
        options:
          - cpu
          - cuda
  push:
    tags:
      - "v*-worker"

permissions:
  contents: write

jobs:
  build:
    name: Build cellule-worker.exe (${{ inputs.cpu_variant || 'cpu' }})
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip + install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller==6.10.0

      - name: Install llama-cpp-python (compile from source)
        shell: pwsh
        run: |
          python -m pip install llama-cpp-python
          python -c "import llama_cpp; print('llama_cpp_imported_ok', getattr(llama_cpp, '__version__', 'unknown'))"

      - name: Install iamine-ai
        shell: pwsh
        run: |
          $version = "${{ inputs.iamine_version }}"
          if ([string]::IsNullOrEmpty($version)) {
            python -m pip install iamine-ai `
              --index-url https://iamine.org/pypi `
              --extra-index-url https://pypi.org/simple
          } else {
            python -m pip install "iamine-ai==$version" `
              --index-url https://iamine.org/pypi `
              --extra-index-url https://pypi.org/simple
          }
          python -c "import iamine; print('iamine_imported_ok', iamine.__version__)"

      - name: Write entry-point stub
        shell: pwsh
        run: |
          $content = @'
          import sys
          from iamine.__main__ import main
          if __name__ == "__main__":
              if len(sys.argv) == 1:
                  sys.argv += ["worker", "--auto"]
              main()
          '@
          $content | Out-File -Encoding ascii worker_entry.py

      - name: Collect llama_cpp DLL paths
        id: dll
        shell: pwsh
        run: |
          $llamaPath = python -c "import llama_cpp, os; print(os.path.dirname(llama_cpp.__file__))"
          Write-Host "llama_cpp path: $llamaPath"
          $libDir = Join-Path $llamaPath "lib"
          Write-Host "Listing $libDir :"
          if (Test-Path $libDir) {
            Get-ChildItem $libDir -Recurse
          } else {
            Write-Error "llama_cpp/lib directory missing — DLLs were not installed"
            exit 1
          }
          # Build --add-binary args, one per DLL. Format on Windows: "src;dest"
          $addBinaries = @()
          foreach ($dll in Get-ChildItem $libDir -Filter *.dll) {
            $addBinaries += "--add-binary"
            $addBinaries += "$($dll.FullName);llama_cpp/lib"
          }
          Write-Host "Collected $($addBinaries.Count / 2) DLLs"
          # Export as GITHUB_OUTPUT multi-line, one token per line
          $out = $addBinaries -join "`n"
          "add_binaries<<EOF`n$out`nEOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "llama_path=$llamaPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          # Reconstruct --add-binary arg list from the step output
          $addBinariesRaw = @'
          ${{ steps.dll.outputs.add_binaries }}
          '@
          $args = $addBinariesRaw -split "`n" | Where-Object { $_.Trim() -ne "" }
          Write-Host "add-binary arg count:" $args.Count

          $pyinstArgs = @(
            "--onefile",
            "--name", "cellule-worker",
            "--paths", "${{ steps.dll.outputs.llama_path }}",
            "--collect-all", "iamine",
            "--collect-all", "llama_cpp",
            "--collect-submodules", "iamine",
            "--hidden-import=aiohttp",
            "--hidden-import=websockets",
            "--hidden-import=asyncpg",
            "--hidden-import=cryptography",
            "--hidden-import=llama_cpp",
            "--console"
          )
          $pyinstArgs += $args
          $pyinstArgs += "worker_entry.py"

          Write-Host "Running: pyinstaller $($pyinstArgs -join ' ')"
          & pyinstaller @pyinstArgs
          Get-ChildItem dist/

      - name: Smoke test .exe
        shell: pwsh
        run: |
          .\dist\cellule-worker.exe --help
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cellule-worker.exe --help failed"
            exit 1
          }

      - name: Report size + fail if too small
        shell: pwsh
        run: |
          $size = (Get-Item dist/cellule-worker.exe).Length / 1MB
          Write-Host ("cellule-worker.exe size: {0:N1} MB" -f $size)
          if ($size -lt 50) {
            Write-Error "exe too small ($size MB) - llama_cpp DLLs still missing"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellule-worker-${{ inputs.cpu_variant || 'cpu' }}-windows
          path: dist/cellule-worker.exe
          retention-days: 30

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Cellule Worker ${{ github.ref_name }}
          body: |
            Standalone Windows worker executable (CPU).
            Install: download cellule-worker.exe and double-click to start.
            Source: https://github.com/CELLULEAI/POOL
            Docs: https://cellule.ai/docs/install-worker.html
          files: dist/cellule-worker.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
