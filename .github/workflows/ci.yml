name: CI

# Lance la suite de tests sur chaque push et chaque PR.
# Volontairement leger : installe les deps d'import necessaires aux tests SANS
# compiler llama-cpp-python (la surface de test mocke le pool et n'importe ni
# le moteur d'inference ni sentence-transformers). Audit 2026-06-22, dimension
# tests/CI : avant, le seul workflow buildait les .exe et ne lancait jamais pytest.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test + light runtime deps (no llama-cpp build)
        run: |
          python -m pip install --upgrade pip
          # deps d'import-time utilisees par la surface de test (toutes en wheels) :
          # fastapi/starlette EPINGLES sur la version que la prod fait tourner :
          # starlette 1.x change include_router (routes enveloppees dans
          # _IncludedRouter au lieu d'etre aplaties dans app.routes), ce qui casse
          # le harnais route-level (test_route_registry). On teste donc exactement
          # ce qui tourne sur le VPS, pas la derniere release upstream.
          pip install "fastapi==0.135.1" "starlette<0.53" uvicorn websockets psutil aiohttp huggingface-hub \
                      cryptography passlib argon2-cffi asyncpg \
                      pytest pytest-asyncio
          # le paquet lui-meme sans ses deps lourdes (llama-cpp / sentence-transformers) :
          pip install -e . --no-deps

      - name: Run tests
        run: pytest -q
